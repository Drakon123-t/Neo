<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Neo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="ko.png" alt="Логотип" class="logo-img">
                <span>NEO<span class="highlight">Студия</span></span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="services.html">Услуги</a></li>
                    <li><a href="contacts.html" class="active">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <div class="contact-wrapper">
                    <div class="contact-info">
                        <h2>Свяжитесь с нами</h2>
                        <p>Готовы обсудить ваш проект? Оставьте заявку или напишите нам напрямую.</p>
                        <ul class="details">
                            <li>📍 Москва, Новый Арбат д. 7</li>
                            <li>📞 +7 (923) 321-53-13</li>
                            <li>✉️ hello@neo-studio.ru</li>
                        </ul>
                        <div class="contact-deco">📀</div>
                    </div>
                    <form class="contact-form" action="#" method="post">
                        <input type="text" placeholder="Ваше имя" required>
                        <input type="email" placeholder="Email" required>
                        <textarea rows="5" placeholder="Сообщение"></textarea>
                        <button type="submit" class="btn btn-primary">Отправить заявку</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 NEO Студия</p>
        </div>
    </footer>
</body>
</html>
